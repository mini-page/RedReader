name: red_reader
description: "iReader: READ FAST, THINK DEEP - Hybrid AI Cognitive Reading System"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.2
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_fonts: ^6.2.1
  file_picker: ^11.0.2
  syncfusion_flutter_pdf: ^28.2.3
  docx_to_text: ^1.0.1
  flutter_spinkit: ^5.2.1
  flutter_slidable: ^3.1.2
  uuid: ^4.5.1
  lucide_icons: ^0.257.0
  flutter_tts: ^4.2.2
  google_generative_ai: ^0.4.5
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/fonts/
    - assets/images/
    - assets/images/app_icon.png
    - assets/images/shalu.jpg
    - assets/images/galley/Lovey_0.jpg
    - assets/images/galley/Lovey_1.jpg
    - assets/images/galley/Lovey_2.jpg
    - assets/images/galley/Lovey_3.jpg
    - assets/images/galley/Lovey_4.jpg
    - assets/images/galley/Lovey_5.jpg
    - assets/images/galley/Lovey_6.jpg
    - assets/images/galley/Lovey_7.jpg
